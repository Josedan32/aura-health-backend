<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Cita Reprogramada</title>
</head>
<body style="margin:0;padding:0;background:#f3f4f6;font-family:Arial,sans-serif;">
  <div style="max-width:600px;margin:40px auto;background:#ffffff;border-radius:8px;overflow:hidden;border:1px solid #e5e7eb;">
    
    <div style="background:#2563eb;padding:24px;text-align:center;color:#ffffff;">
      <h1 style="margin:0;">Aura Health</h1>
    </div>

    <div style="padding:32px;color:#374151;line-height:1.6;">
      <h2 style="margin-top:0;">Cita Reprogramada</h2>

      <p>
        Hola <strong>{{patientName}}</strong>,
      </p>

      <p>
        Tu cita con <strong>{{doctorName}}</strong> ha sido reprogramada.
      </p>

      <table style="width:100%;border-collapse:collapse;margin:24px 0;">
        <tr style="background:#f9fafb;">
          <td style="padding:12px;border:1px solid #e5e7eb;font-weight:bold;">
            Cita anterior
          </td>
          <td style="padding:12px;border:1px solid #e5e7eb;text-decoration:line-through;color:#6b7280;">
            {{previousAppointment}}
          </td>
        </tr>

        <tr>
          <td style="padding:12px;border:1px solid #e5e7eb;font-weight:bold;">
            Nueva cita
          </td>
          <td style="padding:12px;border:1px solid #e5e7eb;color:#16a34a;font-weight:bold;">
            {{newAppointment}}
          </td>
        </tr>

        <tr style="background:#f9fafb;">
          <td style="padding:12px;border:1px solid #e5e7eb;font-weight:bold;">
            Motivo
          </td>
          <td style="padding:12px;border:1px solid #e5e7eb;">
            {{reason}}
          </td>
        </tr>
      </table>

      <p>
        Si tienes preguntas, comunícate con nuestro equipo administrativo.
      </p>
    </div>

    <div style="background:#f3f4f6;padding:16px;text-align:center;font-size:12px;color:#6b7280;">
      © 2026 Aura Health
    </div>
  </div>
</body>
</html>
