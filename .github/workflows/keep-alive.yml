name: Keep-alive before daily agenda

on:
  schedule:
    - cron: '45 10 * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: curl --fail --retry 5 --retry-delay 15 --retry-all-errors https://aura-health-backend-gc2l.onrender.com/api/v1/health
